<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="lava" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="50%" stop-color="#ff4d1f"/>
      <stop offset="100%" stop-color="#c8270a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6a3d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff6a3d" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle lava glow at bottom -->
  <rect x="0" y="420" width="1200" height="210" fill="url(#glow)"/>

  <!-- BrandMark — centered horizontally, upper third -->
  <!-- viewBox origin (32,32) is center. scale(4) → 64*4=256px mark. Center at (600, 180) → translate(600-32*4, 180-32*4) = (472, 52) -->
  <g transform="translate(472, 52) scale(4)" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="miter" fill="none">
    <path d="M32 4 L56 18 V46 L32 60 L8 46 V18 Z"/>
    <path d="M32 4 V32 L8 18"/>
    <path d="M32 32 L56 18"/>
    <path d="M32 32 V60"/>
    <circle cx="32" cy="32" r="4" fill="#ff6a3d" stroke="none"/>
  </g>

  <!-- Title — below mark with gap -->
  <text x="600" y="410" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="700" font-size="72" fill="#ffffff" text-anchor="middle" letter-spacing="-1">
    Basalt Vault
  </text>

  <!-- Subtitle -->
  <text x="600" y="465" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" font-size="26" fill="#808090" text-anchor="middle">
    Delta-neutral yield on Arbitrum
  </text>

  <!-- Accent line -->
  <line x1="480" y1="510" x2="720" y2="510" stroke="url(#lava)" stroke-width="2" opacity="0.4"/>

  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
</svg>
