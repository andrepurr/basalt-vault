name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        run: forge build --skip test script

      - name: Unit tests
        run: forge test --match-path "test/unit/**" --fork-url ${{ secrets.ARBITRUM_RPC_URL }} -vvv

      - name: Integration tests
        run: forge test --match-path "test/integration/**" --fork-url ${{ secrets.ARBITRUM_RPC_URL }} -vvv

      - name: Invariant tests
        run: forge test --match-path "test/invariant/**" --fork-url ${{ secrets.ARBITRUM_RPC_URL }} -vvv
