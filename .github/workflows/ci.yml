name: CI

on: [push, pull_request]

env:
  FOUNDRY_PROFILE: default

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        run: forge build --skip test script

  halmos:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Halmos
        run: pip install halmos

      - name: ShareInvariant (pure math)
        run: halmos --match-contract ShareInvariantTest

      - name: AccessControl
        run: halmos --match-contract AccessControlTest

      - name: HandlerGovernance
        run: halmos --match-contract HandlerGovernanceTest
